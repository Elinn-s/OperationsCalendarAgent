services:
  - type: web
    name: ops-calendar-agent
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=src uvicorn storenotificationcircula.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: APP_DATABASE_MODE
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: ops-calendar-db
          property: connectionString
      - key: AUTH_ENABLED
        value: "true"
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: APP_ADMIN_EMAIL
        sync: false
      - key: APP_ADMIN_PASSWORD
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: LLM_PROVIDER
        value: dify
      - key: DIFY_API_KEY
        sync: false
      - key: DIFY_BASE_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_STARTTLS
        value: "true"
      - key: SMTP_SSL
        value: "false"
      - key: ESCALATION_EMAILS
        sync: false

databases:
  - name: ops-calendar-db
    plan: free
